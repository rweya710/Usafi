services:
  - type: web
    name: usafi-backend
    repo: https://github.com/rweya710/Usafi
    rootDir: backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: RENDER
        value: "true"
      - key: DEBUG
        value: "false"
    routes:
      - type: http
        source: /
        destination: http://localhost:8000/

  - type: static
    name: usafi-frontend
    repo: https://github.com/rweya710/Usafi
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
